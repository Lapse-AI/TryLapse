name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag vs package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare tag to pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -E '^version = ' launch-rehearsal/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match launch-rehearsal version $VERSION"
            exit 1
          fi

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGES.md
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -f CHANGES.md ]; then
            sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGES.md | sed '$d' | tail -n +2 > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            echo "Release ${VERSION}" > release_notes.txt
          fi

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body_path: release_notes.txt
