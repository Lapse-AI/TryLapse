name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (launch-rehearsal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launch-rehearsal
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: launch-rehearsal/pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,billing]"

      - name: Unit tests
        run: pytest -q --cov=rehearse --cov-report=term-missing

      - name: Dry-run example config
        run: rehearse run -c examples/enterprise-authenticated.yaml --dry-run --no-crawl

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend_V1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend_V1/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint -- --max-warnings 20

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
