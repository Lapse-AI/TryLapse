# Generic enterprise SaaS rehearsal — no product-specific logic required.
# Credentials: export REHEARSE_EMAIL and REHEARSE_PASSWORD (optional).

run:
  target_url: https://example.com
  run_id_prefix: enterprise
  product_name: Example Enterprise SaaS

auth:
  login_path: /login
  email_env: REHEARSE_EMAIL
  password_env: REHEARSE_PASSWORD
  email_label: Email
  password_label: Password
  submit_label: Sign in

personas:
  - id: p1-evaluator
    name: First-time evaluator
    role: prospect / new user
    goals:
      - Understand product value within one session
      - Reach primary workflow without support
  - id: p2-operator
    name: Daily operator
    role: power user
    goals:
      - Complete repeat tasks quickly
      - Consistent navigation and shortcuts
  - id: p3-admin
    name: Admin / buyer
    role: IT or team admin
    goals:
      - Verify access controls and trust signals
      - Compare plans, limits, and security posture

journeys:
  - id: j1-land
    name: Land and grasp value
    steps:
      - action: navigate
        url: "{target_url}/"
  - id: j2-auth-entry
    name: Authentication entry point
    steps:
      - action: navigate
        url: "{target_url}/login"
  - id: j3-primary-workflow
    name: Primary workflow surface
    steps:
      - action: navigate
        url: "{target_url}/app"
  - id: j4-pricing-or-plans
    name: Pricing or plans
    steps:
      - action: navigate
        url: "{target_url}/pricing"
  - id: j5-return-navigation
    name: Return visitor wayfinding
    steps:
      - action: navigate
        url: "{target_url}/pricing"
      - action: navigate
        url: "{target_url}/"

budgets:
  max_steps_per_journey: 20
  max_run_seconds: 1800
  step_timeout_ms: 30000
