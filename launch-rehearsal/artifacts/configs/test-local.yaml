run:
  target_url: http://127.0.0.1:8082
  product_name: "Launch Rehearsal"
  allow_localhost: true
  record_video: true
  persona_lens: true

personas:
  - id: p1-evaluator
    name: "Product Evaluator"
    role: "Product Manager"
    goals: ["Evaluate the dashboard", "Check usability", "Test recording features"]
  - id: p2-operator
    name: "System Operator"
    role: "DevOps Engineer"
    goals: ["Monitor system health", "Check performance"]
  - id: p3-admin
    name: "Admin User"
    role: "Administrator"
    goals: ["Configure settings", "Manage users"]

journeys:
  - id: j-test-1
    name: "Visit Home"
    priority: smoke
    steps:
      - action: navigate
        url: /
      - action: wait
        value: "2000"
  - id: j-test-2
    name: "Open Init Page"
    priority: smoke
    steps:
      - action: navigate
        url: /init
      - action: wait
        value: "2000"
  - id: j-test-3
    name: "Visit Runs"
    priority: smoke
    steps:
      - action: navigate
        url: /runs
      - action: wait
        value: "1500"
  - id: j-test-4
    name: "View Agents"
    priority: smoke
    steps:
      - action: navigate
        url: /agents
      - action: wait
        value: "1500"
  - id: j-test-5
    name: "Check Library"
    priority: smoke
    steps:
      - action: navigate
        url: /library
      - action: wait
        value: "1500"
