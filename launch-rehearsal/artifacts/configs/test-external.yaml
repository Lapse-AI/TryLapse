run:
  target_url: https://demo.trylapse.com
  product_name: "LR Demo"
  persona_lens: true

personas:
  - id: p1-evaluator
    name: "Product Evaluator"
    role: "Product Manager"
    goals: ["Evaluate the product"]
  - id: p2-operator
    name: "System Operator"
    role: "DevOps Engineer"
    goals: ["Monitor system"]
  - id: p3-admin
    name: "Admin User"
    role: "Administrator"
    goals: ["Configure settings"]

journeys:
  - id: j-test-1
    name: "Home page"
    priority: smoke
    steps:
      - action: navigate
        url: /
      - action: wait
        value: "2000"
  - id: j-test-2
    name: "Check runs"
    priority: smoke
    steps:
      - action: navigate
        url: /runs
      - action: wait
        value: "1500"
  - id: j-test-3
    name: "View agents"
    priority: smoke
    steps:
      - action: navigate
        url: /agents
      - action: wait
        value: "1500"
  - id: j-test-4
    name: "Check trends"
    priority: smoke
    steps:
      - action: navigate
        url: /trends
      - action: wait
        value: "1500"
  - id: j-test-5
    name: "Browse library"
    priority: smoke
    steps:
      - action: navigate
        url: /library
        url: /library
      - action: wait
        value: "1500"
