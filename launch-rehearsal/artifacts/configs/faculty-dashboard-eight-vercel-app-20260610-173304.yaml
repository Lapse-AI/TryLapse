run:
  target_url: https://faculty-dashboard-eight.vercel.app
  run_id_prefix: faculty-dashboard-eight-vercel-app
  product_name: Argyle Faculty Dashboard
  viewports:
  - desktop
  execute_all_personas_in_browser: true
  persona_lens: false
crawl:
  enabled: true
  max_depth: 2
  max_pages: 30
  supplement_journeys: true
personas:
- id: p1-evaluator
  name: First-time evaluator
  role: prospect / new user
  goals:
  - Understand value from landing and primary workflow
- id: p2-operator
  name: Daily operator
  role: power user
  goals:
  - Complete core tasks quickly and reliably
- id: p3-admin
  name: Admin / buyer
  role: IT admin
  goals:
  - Verify access boundaries and trust signals
- id: model-1-adminstaff
  name: Admin/Staff
  role: Manage system settings and oversee faculty data
  goals:
  - Manage system settings and oversee faculty data
  - Presence of /admin page suggests administrative users.
- id: model-0-faculty-member
  name: Faculty Member
  role: View and manage their own profile and resumes, and search for colleagues.
  goals:
  - View and manage their own profile and resumes, and search for colleagues.
  - The app is named 'Faculty Dashboard' and has profile pages, suggesting faculty
    are the primary users.
- id: model-1-administrator
  name: Administrator
  role: Manage user accounts, configure system settings, and oversee data integrity.
  goals:
  - Manage user accounts, configure system settings, and oversee data integrity.
  - Presence of an /admin page indicates an admin panel for system management.
