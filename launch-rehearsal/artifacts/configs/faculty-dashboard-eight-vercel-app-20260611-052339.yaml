run:
  target_url: https://faculty-dashboard-eight.vercel.app/database
  run_id_prefix: faculty-dashboard-eight-vercel-app
  product_name: Argyle Faculty Dashboard
  viewports:
  - desktop
  execute_all_personas_in_browser: true
  persona_lens: true
crawl:
  enabled: true
  max_depth: 2
  max_pages: 30
  supplement_journeys: true
personas:
- id: p1-evaluator
  name: First-time evaluator
  role: prospect / new user
  goals:
  - Understand value from landing and primary workflow
- id: p2-operator
  name: Daily operator
  role: power user
  goals:
  - Complete core tasks quickly and reliably
- id: p3-admin
  name: Admin / buyer
  role: IT admin
  goals:
  - Verify access boundaries and trust signals
- id: model-1-adminstaff
  name: Admin/Staff
  role: Manage system settings and oversee faculty data
  goals:
  - Manage system settings and oversee faculty data
  - Presence of /admin page suggests administrative users.
- id: model-0-faculty-member
  name: Faculty member
  role: View and update their own professional metrics and data.
  goals:
  - View and update their own professional metrics and data.
  - Profile pages with unique IDs suggest each faculty has their own dashboard page.
- id: model-1-administrator
  name: Administrator
  role: Manage faculty profiles, oversee analytics, and generate reports.
  goals:
  - Manage faculty profiles, oversee analytics, and generate reports.
  - Presence of /admin page suggests administrative functions.
- id: model-2-department-head-or-dean
  name: Department head or dean
  role: Monitor departmental performance and identify trends.
  goals:
  - Monitor departmental performance and identify trends.
  - Analytics dashboard implies comparative performance monitoring.
