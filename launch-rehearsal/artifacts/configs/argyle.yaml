  - action: fill
    intent: Name the second step
    selector: input[placeholder='Step name']
    value: Notify Team
  - action: click
    intent: Save the second step
    selector: button:has-text('Save Step')
  - action: click
    intent: Save the entire workflow
    selector: button:has-text('Save Workflow')
  - action: assert_url_contains
    intent: Confirm navigation to workflows list
    value: /workflows
