    selector: input[placeholder*='Search']
    value: John Doe
  - action: wait
    intent: Allow the system to process the search query and display results
    value: '3000'
  - action: assert_url_contains
    intent: Ensure search is performed on the same page without redirect
    value: /database
  - action: explore
    intent: Verify that the searched name appears as the first result
    selector: div[data-testid='profile-card']:first-child
  - action: click
    intent: Open the profile details page for the searched faculty member
    selector: div[data-testid='profile-card']:first-child
  - action: assert_url_contains
    intent: Confirm navigation to the profile detail page
