    value: jane.smith@university.edu
  - action: fill
    intent: Provide the faculty member's department
    selector: input[name='department']
    value: Computer Science
  - action: click
    intent: Open file picker to select a resume file
    selector: input[type='file']
  - action: fill
    intent: Upload a resume file for parsing
    selector: input[type='file']
    value: /path/to/resume.pdf
  - action: wait
    intent: Wait for parsing to finish
    value: '15000'
  - action: click
    intent: Submit the new faculty profile
