- id: j-1-evalua-9
  name: Search by Name (Exact Match)
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Open the database page to search for faculty profiles
  - action: wait
    intent: Ensure the search input is ready for interaction
    value: '5000'
  - action: click
    intent: Focus the search input to start typing
    selector: input[placeholder*='Search']
  - action: fill
