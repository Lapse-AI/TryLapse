  - action: click
    intent: Open filtered journey details
    selector: .journey-card:first-child
  - action: click
    intent: Launch rehearsal from journey
    selector: .launch-rehearsal-button
  - action: assert_url_contains
    intent: Confirm rehearsal launch
    value: /rehearsal
- id: j-1-evalua-8
  name: View recommendations
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/recommendations
    intent: Navigate to recommendations page
  - action: wait
