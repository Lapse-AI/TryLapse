run:
  target_url: https://faculty-dashboard-eight.vercel.app/database
  run_id_prefix: argyle
  product_name: Argyle Faculty Dashboard
  viewports:
  - desktop
  - tablet
  - mobile
  allow_localhost: false
  persona_lens: true
crawl:
  enabled: true
  max_depth: 2
  max_pages: 24
  supplement_journeys: true
personas:
- id: p1-new-signup
  name: New signup
  role: first-time user
  goals:
  - Complete onboarding and reach first success
  - Identify missing docs or confusing steps
- id: p2-power-user
  name: Power user
  role: experienced user
  goals:
  - Complete core tasks quickly
  - Test integrations and API surfaces
- id: p3-dogfood
  name: Developer dogfooder
  role: internal engineer
  goals:
  - Use dev-facing features and find rough edges
  - Validate that error messages are actionable
- id: p4-internal-champion
  name: Internal champion
  role: team lead / champion
  goals:
  - Validate admin features work correctly
  - Test team collaboration and permissions
  - Find feature gaps for internal adoption
- id: p4-champion
  name: Internal champion
  role: team lead / champion
  goals:
  - Validate rollout to their team
  - Find blockers before wider launch
journeys:
- id: j-argyle-login
  name: Login to Argyle
  priority: smoke
  steps:
  - action: navigate
    url: /
  - action: wait
    value: '2000'
  - action: click
    intent: login button
  - action: wait
    value: '1500'
- id: j-argyle-explore-dashboard
  name: Explore Dashboard
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '2000'
  - action: scroll
    intent: down
- id: j-argyle-view-users
  name: View Users List
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '2000'
  - action: click
    intent: users tab or menu
- id: j-argyle-admin-settings
  name: Access Admin Settings
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '2000'
  - action: click
    intent: admin or settings menu
- id: j-argyle-team-collaboration
  name: Test Team Collaboration
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '2000'
  - action: explore
    intent: team collaboration features
- id: j-1-evalua-1
  name: Launch a rehearsal from hub
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/
    intent: Go to the main hub page
  - action: click
    intent: Click the 'Launch Rehearsal' button on the hub page
    selector: button:has-text('Launch Rehearsal')
  - action: wait
    intent: Wait for rehearsal configuration modal
    value: '2000'
  - action: fill
    intent: Fill in the rehearsal name field
    selector: input[placeholder='Rehearsal Name']
    value: Test Rehearsal 1
  - action: click
    intent: Click the agent dropdown to select an agent
    selector: select#agent-select
  - action: select
    intent: Select an agent from the dropdown
    selector: select#agent-select
    value: agent-1
  - action: click
    intent: Click the 'Start Rehearsal' button in the modal
    selector: button:has-text('Start Rehearsal')
  - action: wait
    intent: Wait for rehearsal progress indicator
    value: '5000'
  - action: assert_url_contains
    intent: Check URL for rehearsal status page
    value: /rehearsals
  - action: wait
    intent: Wait for rehearsal completion
    value: '10000'
  - action: assert_url_contains
    intent: Confirm rehearsal details page
    value: /rehearsals/
- id: j-1-evalua-2
  name: View and manage agents
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/agents
    intent: Go to agents page
  - action: wait
    intent: Wait for content
    value: '5000'
  - action: assert_url_contains
    intent: Check URL
    value: /agents
  - action: click
    intent: Open agent detail modal
    selector: .agent-list-item:first-child
  - action: wait
    intent: Wait for modal
    selector: .agent-detail-modal
    value: '3000'
  - action: click
    intent: Edit agent
    selector: .agent-detail-modal .edit-button
  - action: fill
    intent: Update agent name
    selector: .agent-edit-form input[name='name']
    value: Test Agent
  - action: click
    intent: Save agent changes
    selector: .agent-edit-form .save-button
  - action: wait
    intent: Wait for modal close
    value: '2000'
  - action: click
    intent: Open status filter
    selector: .status-filter-dropdown
  - action: click
    intent: Filter by active status
    selector: .status-filter-dropdown option[value='active']
  - action: assert_url_contains
    intent: Check URL unchanged
    value: /agents
  - action: click
    intent: Open agent detail modal from filtered list
    selector: .agent-list-item:first-child
  - action: click
    intent: Delete agent
    selector: .agent-detail-modal .delete-button
  - action: click
    intent: Confirm deletion
    selector: .confirm-dialog .confirm-button
- id: j-1-evalua-3
  name: Configure an alert
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/alerts
    intent: Go to alerts page
  - action: wait
    value: '2000'
  - action: click
    intent: Create Alert button
  - action: fill
    intent: Alert name input field
    value: High CPU Usage Alert
  - action: fill
    intent: Alert description textarea
    value: Triggers when CPU usage exceeds 90% for 5 minutes
  - action: click
    intent: Add Condition button
  - action: select
    intent: Metric dropdown
    value: CPU Usage
  - action: select
    intent: Operator dropdown
    value: Greater than
  - action: fill
    intent: Threshold input field
    value: '90'
  - action: click
    intent: Add Action button
  - action: select
    intent: Action type dropdown
    value: Email Notification
  - action: fill
    intent: Email recipient input
    value: admin@example.com
  - action: click
    intent: Save Alert button
  - action: assert_url_contains
    value: /alerts
- id: j-1-evalua-4
  name: Compare rehearsal runs
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/compare
    intent: Open the compare rehearsal runs page
  - action: wait
    intent: Wait for content to render
    value: '5000'
  - action: click
    intent: Select the first rehearsal run to compare
    selector: .run-selector .run-item:first-child
  - action: click
    intent: Select the second rehearsal run to compare
    selector: .run-selector .run-item:nth-child(2)
  - action: click
    intent: Trigger the comparison of selected runs
    selector: button:has-text('Compare')
  - action: wait
    intent: Wait for metrics to be displayed
    value: '3000'
  - action: assert_url_contains
    intent: Confirm no navigation away
    value: /compare
  - action: click
    intent: Sort the comparison table by a specific metric
    selector: .metric-table th:first-child
  - action: click
    intent: View detailed metrics for a specific run
    selector: .metric-table tbody tr:first-child
  - action: assert_url_contains
    intent: Confirm no unexpected navigation
    value: /compare
- id: j-1-evalua-5
  name: Manage integrations
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/integrations
    intent: Go to integrations page
  - action: assert_url_contains
    intent: Confirm on integrations page
    value: /integrations
  - action: click
    intent: Click Connect button for Slack
    selector: button[aria-label='Connect Slack']
  - action: wait
    intent: Wait for OAuth popup
    value: '5000'
  - action: explore
    intent: Focus on OAuth popup
  - action: fill
    intent: Fill email field in OAuth form
    selector: input[name='email']
    value: ${REHEARSE_EMAIL}
  - action: fill
    intent: Fill password field in OAuth form
    selector: input[name='password']
    value: ${REHEARSE_PASSWORD}
  - action: click
    intent: Click Sign In button
    selector: button[type='submit']
  - action: wait
    intent: Wait for OAuth completion
    value: '10000'
  - action: assert_url_contains
    intent: Confirm return to integrations page
    value: /integrations
  - action: click
    intent: Click Disconnect button for Slack
    selector: button[aria-label='Disconnect Slack']
  - action: click
    intent: Confirm disconnect
    selector: button:has-text('Confirm')
  - action: assert_url_contains
    intent: Confirm still on integrations page
    value: /integrations
- id: j-1-evalua-6
  name: Access CLI commands
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/cli
    intent: Go to CLI commands page
  - action: wait
    intent: Wait for CLI commands list to appear
    value: '5000'
  - action: assert_url_contains
    intent: Confirm we are on the CLI page
    value: /cli
  - action: explore
    intent: Find the command list element
  - action: click
    intent: Copy the first CLI command to clipboard
    selector: button:has-text('Copy')
  - action: assert_url_contains
    intent: Ensure no navigation occurred
    value: /cli
  - action: explore
    intent: Look for a filter to narrow down commands
    selector: input[placeholder*='Search' i], input[placeholder*='Filter' i]
  - action: fill
    intent: Filter commands by keyword
    selector: input[placeholder*='Search' i], input[placeholder*='Filter' i]
    value: run
  - action: click
    intent: Expand command details
    selector: tr:first-child td:first-child a, .command-item:first-child
  - action: assert_url_contains
    intent: Ensure we stay on CLI page
    value: /cli
  - action: dismiss
    intent: Close the details panel
    selector: button:has-text('Close'), button[aria-label='Close']
- id: j-1-evalua-7
  name: Explore journey library
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/journeys
    intent: Go to journey library
  - action: wait
    intent: Wait for content to appear
    value: '5000'
  - action: assert_url_contains
    intent: Confirm correct page
    value: /journeys
  - action: click
    intent: Open journey details
