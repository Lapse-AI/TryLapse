  - action: click
    intent: Focus search bar
    selector: input[placeholder='Search journeys...']
  - action: fill
    intent: Filter journeys by keyword
    selector: input[placeholder='Search journeys...']
    value: onboarding
  - action: wait
    intent: Wait for filtering
    value: '2000'
  - action: assert_url_contains
    intent: Confirm search is reflected in URL
