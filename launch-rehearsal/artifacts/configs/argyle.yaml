- id: j-1-evalua-12
  name: Recover from failed rehearsal launch
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/
    intent: Go to the main dashboard
  - action: click
    intent: Initiate a rehearsal launch
    selector: button:has-text('Launch Rehearsal')
  - action: fill
    intent: Name the rehearsal
    selector: input[placeholder='Rehearsal Name']
    value: Test Rehearsal 1
  - action: click
    intent: Submit the rehearsal launch
    selector: button:has-text('Start Rehearsal')
  - action: wait
    intent: Observe error feedback
    value: '5000'
  - action: assert_url_contains
    intent: Confirm no navigation occurred
    value: /
  - action: click
    intent: Access error details
    selector: div[role='alert'] a:has-text('View Logs')
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/logs
    intent: Go to log viewer to diagnose failure
  - action: wait
    intent: Ensure logs are rendered
    value: '3000'
  - action: click
    intent: View error details
    selector: div.log-entry:first-child
  - action: assert_url_contains
    intent: Confirm location
    value: /logs
  - action: click
    intent: Retry the rehearsal launch
    selector: button:has-text('Retry')
  - action: wait
    intent: Observe outcome of retry
    value: '5000'
  - action: assert_url_contains
    intent: Confirm final state
    value: /logs
