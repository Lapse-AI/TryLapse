run:
  target_url: https://faculty-dashboard-eight.vercel.app/database
  run_id_prefix: argyle
  product_name: Argyle Faculty Dashboard
  viewports:
  - desktop
  allow_localhost: false
  persona_lens: true
crawl:
  enabled: true
  max_depth: 2
  max_pages: 20
  supplement_journeys: true

personas:
- id: p1-faculty-member
  name: Faculty Member
  role: professor / academic staff
  goals:
  - View academic analytics and performance data
  - Monitor student engagement metrics
  - Access course management features
- id: p2-department-admin
  name: Department Admin
  role: academic administrator
  goals:
  - Oversee department-wide analytics
  - Manage faculty access and permissions
  - Generate reports for leadership
- id: p3-new-faculty
  name: New Faculty Member
  role: first-time user / new hire
  goals:
  - Complete onboarding and understand the dashboard
  - Find key data quickly without prior context
  - Identify what data is available for their courses

journeys:
- id: j-load-dashboard
  name: Load main dashboard
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: "4000"
  - action: scroll
    intent: scroll down to see full dashboard content

- id: j-explore-analytics
  name: Explore analytics section
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: "3000"
  - action: click
    intent: analytics or data section link or tab
  - action: wait
    value: "2000"

- id: j-view-course-data
  name: View course data
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: "3000"
  - action: click
    intent: courses or course management section
  - action: wait
    value: "2000"
  - action: scroll
    intent: scroll through course list

- id: j-check-student-metrics
  name: Check student engagement metrics
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: "3000"
  - action: click
    intent: student engagement or metrics section
  - action: wait
    value: "2000"

- id: j-navigate-pages
  name: Navigate between dashboard pages
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: "3000"
  - action: click
    intent: navigation menu item or sidebar link
  - action: wait
    value: "2000"
  - action: click
    intent: another navigation item
  - action: wait
    value: "1500"
