run:
  target_url: https://faculty-dashboard-eight.vercel.app
  run_id_prefix: argyle
  product_name: Argyle Faculty Dashboard
  viewports:
  - desktop
  allow_localhost: false
  persona_lens: true
budgets:
  max_run_seconds: 7200
  max_steps_per_journey: 30
  step_timeout_ms: 30000
  parallel_journeys: 4
crawl:
  enabled: true
  max_depth: 2
  max_pages: 20
  supplement_journeys: true
personas:
- id: model-0-faculty-member
  name: Faculty Member
  role: Manage their professional profile and search for colleagues.
  goals:
  - Manage their professional profile and search for colleagues.
  - The product is named 'Faculty Dashboard' and includes features like AI Search
    and Add Faculty.
- id: p4-profile-searcher
  name: Profile Searcher
  role: Searches profiles in detail to identify use cases
  goals:
  - Find specific use cases from profile data
  - Efficiently search and filter profiles
  - Validate use case hypotheses
- id: p4-candidate-finder
  name: Alex Chen
  role: Recruiter using AI Search to find candidates
  goals:
  - Quickly identify top candidates from a large applicant pool
  - Evaluate candidate fit based on job requirements
  - Streamline the initial screening process
- id: p4-candidate-analyst
  name: Candidate Analyst
  role: Analyzes candidate profiles and qualifications
  goals:
  - Review candidate applications and shortlist qualified candidates
  - Compare candidate skills against job requirements
  - Provide hiring recommendations
journeys:
- id: j-load-dashboard
  name: Load main dashboard
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '4000'
  - action: scroll
    intent: scroll down to see full dashboard content
- id: j-explore-analytics
  name: Explore analytics section
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '3000'
  - action: click
    intent: analytics or data section link or tab
  - action: wait
    value: '2000'
- id: j-view-course-data
  name: View course data
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '3000'
  - action: click
    intent: courses or course management section
  - action: wait
    value: '2000'
  - action: scroll
    intent: scroll through course list
- id: j-check-student-metrics
  name: Check student engagement metrics
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '3000'
  - action: click
    intent: student engagement or metrics section
  - action: wait
    value: '2000'
- id: j-navigate-pages
  name: Navigate between dashboard pages
  priority: smoke
  steps:
  - action: navigate
    url: /database
  - action: wait
    value: '3000'
  - action: click
    intent: navigation menu item or sidebar link
  - action: wait
    value: '2000'
  - action: click
    intent: another navigation item
  - action: wait
    value: '1500'
- id: j-1-evalua-1
  name: AI Search for Faculty
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Go to the main database page to access the AI search
  - action: assert_url_contains
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Confirm successful navigation
    value: /database
  - action: wait
    intent: Ensure all elements are rendered
    value: '3000'
  - action: click
    intent: Activate the search bar for typing
    selector: input[placeholder*='Search']
  - action: fill
    intent: Search for faculty with expertise in machine learning
    selector: input[placeholder*='Search']
    value: machine learning
  - action: press
    intent: Trigger the AI search
    selector: input[placeholder*='Search']
    value: Enter
  - action: wait
    intent: Allow time for the API response
    value: '5000'
  - action: assert_url_contains
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Ensure we remain on the database page
    value: /database
  - action: assert_url_contains
    intent: Confirm search is reflected in URL
    value: ?q=machine+learning
  - action: explore
    intent: Verify that search results are interactive and lead to profile details
    selector: .profile-card:first-child
  - action: assert_url_contains
    intent: Confirm navigation to profile detail page
    value: /database/profile/
  - action: click
    intent: Return to the search results to test other sub-flows
    value: Back
- id: j-1-evalua-2
  name: View Profile Details
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Go to the database page
  - action: wait
    intent: Wait for profile list
    value: '3000'
  - action: click
    intent: Click on the first profile link or card
    selector: .profile-card:first-child a, .profile-row:first-child a, a[href*='/profile/']:first-of-type
  - action: assert_url_contains
    intent: Check URL contains profile ID
    value: /profile/
  - action: wait
    intent: Wait for profile data
    value: '3000'
  - action: assert_url_contains
    intent: Assert profile ID in URL
    value: /profile/
  - action: click
    intent: Open Resume Data section
    selector: button:has-text('Resume Data'), .resume-data-tab, section#resume-data
  - action: wait
    intent: Wait for resume parsing results
    value: '2000'
  - action: scroll
    intent: Scroll to bottom of resume data
    selector: .resume-data-container
  - action: assert_url_contains
    intent: Assert URL unchanged
    value: /profile/
  - action: click
    intent: Click on profile header
    selector: .profile-header, h1, .profile-name
  - action: assert_url_contains
    intent: Final URL check
    value: /profile/
- id: j-1-evalua-3
  name: Add New Faculty Profile
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Access the main database page to view faculty profiles and add new ones
  - action: click
    intent: Open the modal for adding a new faculty member
    selector: button:has-text('+ Add Faculty')
  - action: fill
    intent: Provide the name of the new faculty member
    selector: input[name='name']
    value: Dr. Jane Smith
  - action: fill
    intent: Provide email contact for the faculty member
    selector: input[name='email']
    value: jane.smith@university.edu
  - action: fill
    intent: Specify the department the faculty belongs to
    selector: input[name='department']
    value: Computer Science
  - action: click
    intent: Initiate resume file upload for parsing
    selector: button:has-text('Upload Resume')
  - action: fill
    intent: Upload a resume file for parsing via Gemini API
    selector: input[type='file']
    value: /path/to/resume.pdf
  - action: wait
    intent: Allow time for the Gemini API to parse the resume
    value: '10000'
  - action: click
    intent: Save the new faculty member with parsed resume data
    selector: button:has-text('Save')
  - action: assert_url_contains
    intent: Confirm no unexpected navigation occurred
    value: /database
  - action: click
    intent: Open the profile to verify parsed data is displayed correctly
    selector: text=Dr. Jane Smith
  - action: assert_url_contains
    intent: Confirm navigation to the profile detail page
    value: /database/profile/
- id: j-1-evalua-4
  name: Browse Faculty Database
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Access the main database of faculty profiles
  - action: wait
    intent: Ensure the table has loaded
    selector: table
    value: '5000'
  - action: scroll
    intent: Browse through the list of profiles
    selector: table
    value: down
  - action: assert_url_contains
    intent: Confirm no navigation occurred
    value: /database
  - action: click
    intent: Open the profile detail page
    selector: table tbody tr:first-child td:first-child a
  - action: assert_url_contains
    intent: Confirm profile detail page loaded
    value: /database/profile/
  - action: click
    intent: Go back to the list view
  - action: wait
    intent: Ensure the table is visible again
    selector: table
    value: '3000'
  - action: click
    intent: Navigate to the next page of profiles
    selector: button:has-text('Next')
  - action: wait
    intent: Ensure new data loaded
    selector: table
    value: '3000'
  - action: click
    intent: Go back to the first page
    selector: button:has-text('Previous')
  - action: click
    intent: Sort the table alphabetically by name
    selector: th:has-text('Name')
  - action: click
    intent: Sort descending by name
    selector: th:has-text('Name')
  - action: assert_url_contains
    intent: Confirm no unexpected navigation
    value: /database
- id: j-1-evalua-5
  name: Filter Faculty by Department or Expertise
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Go to faculty database
  - action: wait
    intent: Wait for data to appear
    value: '3000'
  - action: click
    intent: Open department filter dropdown
    selector: select[aria-label='Department filter']
  - action: select
    intent: Filter by Computer Science department
    selector: select[aria-label='Department filter']
    value: Computer Science
  - action: assert_url_contains
    intent: Check that filter is applied in URL
    value: department=Computer%20Science
  - action: wait
    intent: Wait for list update
    value: '2000'
  - action: click
    intent: Open expertise filter dropdown
    selector: select[aria-label='Expertise filter']
  - action: select
    intent: Filter by Machine Learning expertise
    selector: select[aria-label='Expertise filter']
    value: Machine Learning
  - action: wait
    intent: Wait for list update
    value: '2000'
  - action: click
    intent: Clear all applied filters
    selector: button:has-text('Clear Filters')
  - action: wait
    intent: Wait for unfiltered list
    value: '2000'
  - action: assert_url_contains
    intent: Check that filters are cleared
    value: /database
- id: j-1-evalua-6
  name: Edit Own Profile
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database
    intent: Go to the main database page to find and click on own profile
  - action: click
    intent: Click on the profile link to view details
    selector: a[href*='/database/profile/']:has-text('John Doe')
  - action: assert_url_contains
    intent: Confirm profile detail page is loaded
    value: /database/profile/
  - action: click
    intent: Click the edit button to enable editing of profile fields
    selector: button:has-text('Edit Profile')
  - action: fill
    intent: Change the name field to 'John A. Doe'
    selector: input[name='name']
    value: John A. Doe
  - action: fill
    intent: Change the email field to 'john.doe@university.edu'
    selector: input[name='email']
    value: john.doe@university.edu
  - action: click
    intent: Click the Save button to persist the changes
    selector: button:has-text('Save')
  - action: wait
    intent: Wait for the success toast or message
    value: '2000'
  - action: assert_url_contains
    intent: Confirm we are still on the profile detail page
    value: /database/profile/
  - action: click
    intent: Re-enter edit mode to check the updated fields
    selector: button:has-text('Edit Profile')
  - action: click
    intent: Click Cancel to discard any accidental changes
    selector: button:has-text('Cancel')
- id: j-1-evalua-7
  name: Admin User Management
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/admin
    intent: Go to admin page
  - action: wait
    intent: Wait for table to appear
    value: '3000'
  - action: assert_url_contains
    value: /admin
  - action: click
    intent: Click role dropdown for first user
    selector: table tbody tr:first-child select
  - action: select
    intent: Change role to Admin
    selector: table tbody tr:first-child select
    value: Admin
  - action: click
    intent: Click delete button for second user
    selector: table tbody tr:nth-child(2) button:has-text('Delete')
  - action: wait
    intent: Wait for modal to appear
    value: '2000'
  - action: click
    intent: Confirm deletion
    selector: div.modal button:has-text('Confirm')
  - action: wait
    intent: Wait for deletion to complete
    value: '2000'
  - action: click
    intent: Open add user form
    selector: button:has-text('Add User')
  - action: fill
    intent: Fill email input
    selector: input[name='email']
    value: newuser@example.com
  - action: fill
    intent: Fill password input
    selector: input[name='password']
    value: password123
  - action: select
    intent: Select role dropdown
    selector: select[name='role']
    value: Faculty
  - action: click
    intent: Submit new user form
    selector: button:has-text('Save')
