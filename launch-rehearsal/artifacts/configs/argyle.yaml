  - action: click
    intent: Expand the parsed data card to see full details
    selector: button[aria-label='Expand parsed data']
  - action: assert_url_contains
    intent: Check that parsed education data is displayed
    value: Education
  - action: click
    intent: Edit a parsed field to correct inaccuracies
    selector: button[aria-label='Edit education']
  - action: fill
    intent: Modify the parsed education entry
    selector: input[name='education']
    value: Ph.D. in Computer Science, MIT
  - action: click
    intent: Save the edited parsed field
    selector: button:has-text('Save')
  - action: assert_url_contains
    intent: Confirm the edit was successful
    value: Ph.D. in Computer Science, MIT
- id: j-1-evalua-11
  name: Delete Faculty Profile
  steps:
  - action: navigate
    url: https://faculty-dashboard-eight.vercel.app/database/profile/1
    intent: Go to profile page to view details and delete the profile.
  - action: click
    intent: Click the Delete button on the profile page.
    selector: button:has-text('Delete')
  - action: wait
    intent: Wait for modal visibility.
    selector: .modal
    value: '2000'
  - action: click
    intent: Click Cancel to dismiss the modal.
    selector: button:has-text('Cancel')
  - action: click
    intent: Click Delete button again.
    selector: button:has-text('Delete')
  - action: click
    intent: Click Confirm to delete the profile.
    selector: button:has-text('Confirm')
  - action: assert_url_contains
    intent: Check URL after deletion.
    value: /database
  - action: wait
    intent: Wait for success message.
    selector: .toast
    value: '3000'
  - action: click
    intent: Click Undo to restore the profile.
    selector: button:has-text('Undo')
  - action: assert_url_contains
    intent: Check URL after undo.
    value: /database/profile/1
  - action: click
    intent: Click Delete again.
    selector: button:has-text('Delete')
  - action: click
    intent: Click Confirm.
    selector: button:has-text('Confirm')
  - action: wait
    intent: Wait for undo timeout to expire.
    selector: .toast
    value: '5000'
  - action: assert_url_contains
    intent: Final URL check.
    value: /database
