run:
  target_url: http://127.0.0.1:8081
  run_id_prefix: lr-self
  product_name: Launch Rehearsal Dashboard
  viewports:
  - desktop
  allow_localhost: true
  persona_lens: true
crawl:
  enabled: true
  max_depth: 2
  max_pages: 24
  supplement_journeys: true
  exclude_path_prefixes:
  - /runs/
  - /api/
personas:
- id: p1-evaluator
  name: First-time evaluator
  role: prospect / new user
  goals:
  - Understand value from landing and primary workflow
  enabled: true
  tech_literacy: intermediate
  patience: medium
  trust_level: neutral
  character: Exploring cautiously; reads section headings before clicking; expects
    to find a clear "get started" path within the first 30 seconds.
  usage_context: Heard about Launch Rehearsal from a colleague; first time visiting
    the product, has not read any docs.
- id: p2-operator
  name: Daily operator
  role: power user
  goals:
  - Complete core tasks quickly and reliably
  enabled: true
  tech_literacy: expert
  patience: low
  trust_level: trusting
  character: Has memorized the layout; goes directly to the Runner or Run History
    without reading; gets frustrated if a page takes more than 2s to load.
  usage_context: Uses Launch Rehearsal every day before shipping; wants zero friction
    in the trigger-run → view-results loop.
- id: p3-admin
  name: Admin / buyer
  role: IT admin
  goals:
  - Verify access boundaries and trust signals
  enabled: true
  tech_literacy: expert
  patience: high
  trust_level: skeptical
  character: Reads security and auth flows carefully; opens network tab in devtools
    mentally; checks that credentials are scoped per user before approving.
  usage_context: Evaluating whether to deploy Launch Rehearsal for the engineering
    team; needs to confirm auth, data isolation, and no hardcoded secrets.
- id: p4-skeptic
  name: Skeptical evaluator
  role: hard-to-convince buyer
  goals:
  - Find reasons not to adopt
  - Stress-test claims on pricing and security pages
  tech_literacy: intermediate
  patience: low
  trust_level: skeptical
  character: Actively looking for friction and broken promises; clicks on secondary
    pages (About, Pricing, Security) that most users skip; quick to dismiss if
    anything feels hand-wavy.
  usage_context: Competing product is already in trial; needs a concrete reason to
    switch before the trial period ends.
journeys:
- id: j1-command-center
  name: Command center
  steps:
  - action: navigate
    url: http://127.0.0.1:8081/
  - action: wait
    value: '2500'
- id: j2-runs
  name: Runs list
  steps:
  - action: navigate
    url: http://127.0.0.1:8081/runs
  - action: wait
    value: '2000'
- id: j3-compare
  name: Compare runs
  steps:
  - action: navigate
    url: http://127.0.0.1:8081/compare
  - action: wait
    value: '2000'
- id: j4-init-dogfood
  name: Init dogfood flow
  steps:
  - action: navigate
    url: http://127.0.0.1:8081/init
  - action: wait
    value: '1500'
  - action: click
    intent: Use http://127.0.0.1:8081
  - action: click
    intent: Preflight HEAD
  - action: wait
    value: '1500'
- id: j5-runner
  name: Runner page (observe only — no self-trigger)
  steps:
  - action: navigate
    url: http://127.0.0.1:8081/runner
  - action: wait
    value: '2000'
  - action: assert_url_contains
    value: /runner
- id: j6-trends
  name: Trends monitoring
  steps:
  - action: navigate
    url: http://127.0.0.1:8081/trends
  - action: wait
    value: '2000'
- id: j-test-1
  name: Test journey from discovery
  steps:
  - action: navigate
    url: /
  - action: wait
    value: '1000'
budgets:
  max_steps_per_journey: 48
  max_run_seconds: 1200
  step_timeout_ms: 45000
auth:
  login_path: /login
  email_env: REHEARSE_EMAIL
  password_env: REHEARSE_PASSWORD
